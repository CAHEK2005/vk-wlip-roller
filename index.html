<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VK Cloud Whitelist IP Roller</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    h1 { font-size: 1.5rem; font-weight: 700; color: #e6edf3; margin-bottom: 4px; }
    .subtitle { font-size: 0.82rem; color: #8b949e; margin-bottom: 20px; }

    /* Cards */
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #8b949e;
    }

    /* Account card */
    .account-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .account-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .account-name-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid #30363d;
      color: #e6edf3;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 2px 4px;
      outline: none;
    }

    .account-name-input:focus { border-bottom-color: #58a6ff; }

    /* Form fields */
    .field-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .field-label {
      font-size: 0.72rem;
      color: #8b949e;
      white-space: nowrap;
      width: 72px;
      flex-shrink: 0;
    }

    input[type="password"],
    input[type="text"],
    input[type="number"] {
      flex: 1;
      min-width: 140px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="file"] {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 0.78rem;
      padding: 5px 10px;
      cursor: pointer;
      min-width: 140px;
    }

    input[type="number"] { max-width: 90px; min-width: 70px; }
    input:focus { border-color: #58a6ff; }

    .field-hint {
      font-size: 0.7rem;
      color: #484f58;
      padding-left: 80px;
      margin-top: -4px;
      margin-bottom: 6px;
    }

    /* Parsed openrc badge */
    .openrc-status {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .openrc-ok  { background: #1a4731; color: #3fb950; }
    .openrc-err { background: #3d1a1a; color: #f85149; }

    /* IP list inside account */
    .ip-list-small {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
      max-height: 150px;
      overflow-y: auto;
    }

    .ip-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 5px;
      padding: 5px 10px;
      font-family: monospace;
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color 0.12s;
    }

    .ip-item:hover { border-color: #388bfd; }
    .ip-item.selected { border-color: #1f6feb; background: #0d1f3c; }

    .ip-addr { color: #79c0ff; flex: 1; }
    .ip-badge { font-size: 0.68rem; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
    .badge-active { background: #1a4731; color: #3fb950; }
    .badge-down   { background: #3d1a1a; color: #f85149; }
    .badge-other  { background: #2d2d2d; color: #8b949e; }
    .ip-fixed { color: #8b949e; font-size: 0.7rem; }

    /* Buttons */
    button {
      cursor: pointer; border: none; border-radius: 6px;
      font-size: 0.8rem; font-weight: 600; padding: 6px 14px;
      transition: opacity 0.15s, background 0.15s; white-space: nowrap;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary   { background: #238636; color: #fff; }
    .btn-primary:hover:not(:disabled)   { background: #2ea043; }

    .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
    .btn-secondary:hover:not(:disabled) { background: #30363d; }

    .btn-danger    { background: #da3633; color: #fff; }
    .btn-danger:hover:not(:disabled)    { background: #f85149; }

    .btn-stop      { background: #b94700; color: #fff; }
    .btn-stop:hover:not(:disabled)      { background: #d85200; }

    .btn-icon {
      background: transparent; border: none; color: #8b949e;
      font-size: 1rem; padding: 2px 6px; cursor: pointer; border-radius: 4px;
    }
    .btn-icon:hover { color: #f85149; background: #2d1a1a; }

    /* Checkbox */
    input[type="checkbox"] {
      width: 16px; height: 16px; cursor: pointer; accent-color: #238636;
      flex-shrink: 0;
    }

    /* Provider tabs */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
      border-bottom: 1px solid #30363d;
    }
    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #8b949e;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 8px 16px;
      cursor: pointer;
      margin-bottom: -1px;
    }
    .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }
    .tab-btn:hover:not(.active) { color: #c9d1d9; }

    .provider-badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .badge-vk { background: #1c4980; color: #79c0ff; }
    .badge-yc { background: #3d2400; color: #e3985c; }

    /* Settings row */
    .settings-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .settings-row label { font-size: 0.8rem; color: #c9d1d9; }

    /* Actions bar */
    .actions-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    /* Check IP row */
    .check-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Log sections */
    .log-section { margin-bottom: 14px; }

    .log-account-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #58a6ff;
      padding: 0 0 6px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .log-account-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #21262d;
    }

    .log-panel {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.78rem;
      height: 180px;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .log-row { padding: 1px 0; line-height: 1.6; }
    .log-info { color: #8b949e; }
    .log-miss { color: #f85149; }
    .log-hit  { color: #3fb950; font-weight: 700; }
    .log-warn { color: #d29922; }

    /* Status banner per account */
    .status-banner {
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      margin-top: 6px;
      display: none;
    }
    .status-banner.show { display: block; }
    .status-running { background: #1c2a3e; color: #58a6ff; border: 1px solid #1f6feb; }
    .status-success { background: #1a4731; color: #3fb950; border: 1px solid #238636; }
    .status-error   { background: #3d1a1a; color: #f85149; border: 1px solid #da3633; }
    .status-stopped { background: #2d2300; color: #d29922; border: 1px solid #9e6a03; }

    .empty-hint { color: #484f58; font-size: 0.75rem; text-align: center; padding: 12px; }

    /* Replace mode selected label */
    .replace-label {
      font-size: 0.72rem;
      color: #8b949e;
      margin-top: 4px;
      min-height: 16px;
    }
    .replace-label span { color: #79c0ff; font-family: monospace; }

    /* Reconnect banner */
    .reconnect-banner {
      display: none;
      background: #1c2a3e;
      border: 1px solid #1f6feb;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 14px;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .reconnect-banner.show { display: flex; }
    .reconnect-banner-text { color: #58a6ff; flex: 1; font-size: 0.85rem; font-weight: 600; }
  </style>
</head>
<body>
<div class="container">

  <h1>Cloud Whitelist IP Roller</h1>
  <p class="subtitle">Поиск внешних IP из белого списка подсетей — VK Cloud и Yandex Cloud</p>

  <!-- Sessions panel -->
  <div id="sessionsPanel" style="display:none; margin-bottom:14px;">
    <div class="card-title" style="margin-bottom:8px;">Активные сессии</div>
    <div id="sessionsList"></div>
  </div>

  <!-- Accounts card -->
  <div class="card">
    <div class="tab-bar">
      <button class="tab-btn active" id="tabBtnVK" onclick="switchTab('vk')">VK Cloud</button>
      <button class="tab-btn" id="tabBtnYC" onclick="switchTab('yc')">Yandex Cloud</button>
    </div>
    <div id="panelVK">
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
        <button class="btn-secondary" onclick="addVKAccount()">+ Добавить аккаунт VK</button>
      </div>
      <div id="vkAccountsList"></div>
    </div>
    <div id="panelYC" style="display:none">
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
        <button class="btn-secondary" onclick="addYCAccount()">+ Добавить аккаунт YC</button>
      </div>
      <div id="ycAccountsList"></div>
    </div>
  </div>

  <!-- Whitelist card -->
  <div class="card">
    <div class="card-title" style="margin-bottom:10px;">Белый список подсетей</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.85rem;">
        <input type="radio" name="whitelistMode" value="default" checked
               onchange="setWhitelistMode('default')"
               style="accent-color:#238636;width:14px;height:14px;margin:0;">
        Стандартный
        <span id="defaultWhitelistLabel" style="color:#8b949e;font-size:0.78rem;">
          (cidrwhitelist.txt — загрузка...)
        </span>
      </label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.85rem;">
        <input type="radio" name="whitelistMode" value="custom"
               onchange="setWhitelistMode('custom')"
               style="accent-color:#238636;width:14px;height:14px;margin:0;">
        Свой список
        <input type="file" id="customWhitelistFile" accept=".txt,text/plain"
               style="display:none;" onchange="loadCustomWhitelist(this)">
        <button class="btn-secondary" id="btnPickWhitelist" style="display:none;font-size:0.75rem;padding:4px 10px;"
                onclick="document.getElementById('customWhitelistFile').click()">
          Выбрать файл
        </button>
        <span id="customWhitelistStatus" style="font-size:0.78rem;color:#8b949e;"></span>
      </label>
    </div>
  </div>

  <!-- Settings card -->
  <div class="card">
    <div class="card-title" style="margin-bottom:10px;">Настройки паузы</div>
    <div class="settings-row" style="margin-bottom:10px;">
      <label>Интервал между попытками:</label>
      <label style="color:#8b949e;font-size:0.78rem;">от</label>
      <input type="number" id="delayMin" value="3" min="1" max="300" step="1">
      <label style="color:#8b949e;font-size:0.78rem;">до</label>
      <input type="number" id="delayMax" value="8" min="1" max="300" step="1">
      <label style="color:#8b949e;font-size:0.78rem;">секунд</label>
    </div>
    <div class="settings-row">
      <label>Длинная пауза:</label>
      <label style="color:#8b949e;font-size:0.78rem;">шанс</label>
      <input type="number" id="longPauseChance" value="10" min="0" max="100" step="1">
      <label style="color:#8b949e;font-size:0.78rem;">% &nbsp; от</label>
      <input type="number" id="longPauseMin" value="5" min="1" max="120" step="1">
      <label style="color:#8b949e;font-size:0.78rem;">до</label>
      <input type="number" id="longPauseMax" value="20" min="1" max="120" step="1">
      <label style="color:#8b949e;font-size:0.78rem;">минут &nbsp;(независимо для каждого аккаунта)</label>
    </div>
    <div class="settings-row" style="margin-top:8px;">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
        <input type="checkbox" id="restEnabled" style="width:14px;height:14px;margin:0;accent-color:#238636;" checked>
        Плановый отдых:
      </label>
      <label style="color:#8b949e;font-size:0.78rem;">каждые</label>
      <input type="number" id="restEvery" value="50" min="10" max="500" step="10" style="width:60px;">
      <label style="color:#8b949e;font-size:0.78rem;">попыток, на</label>
      <input type="number" id="restMin" value="30" min="5" max="240" step="5" style="width:55px;">
      <label style="color:#8b949e;font-size:0.78rem;">—</label>
      <input type="number" id="restMax" value="90" min="5" max="480" step="5" style="width:55px;">
      <label style="color:#8b949e;font-size:0.78rem;">минут</label>
    </div>
    <div class="settings-row" style="margin-top:10px;">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
        <input type="checkbox" id="timerEnabled" style="width:14px;height:14px;margin:0;accent-color:#238636;">
        Таймер:
      </label>
      <input type="number" id="timerMinutes" value="60" min="1" max="1440" step="1">
      <label style="color:#8b949e;font-size:0.78rem;">мин — затем остановить</label>
      <span id="timerCountdown" style="font-family:monospace;font-size:0.8rem;color:#58a6ff;font-weight:600;"></span>
    </div>
  </div>

  <!-- Actions bar -->
  <div class="actions-bar">
    <button class="btn-primary" id="btnStartAll" onclick="startAll()">Запустить поиск на выбранных</button>
    <button class="btn-stop"    id="btnStopAll"  onclick="stopAll()" style="display:none;">Остановить всё</button>
  </div>

  <!-- IP check widget -->
  <div class="card">
    <div class="card-title" style="margin-bottom:10px;">Проверить IP по белому списку</div>
    <div class="check-row">
      <input type="text" id="checkIpInput" placeholder="например: 5.8.22.1" style="max-width:200px;"
             onkeydown="if(event.key==='Enter') checkIP()">
      <button class="btn-secondary" onclick="checkIP()">Проверить</button>
      <span id="checkIpResult" style="font-family:monospace;font-size:0.82rem;"></span>
    </div>
  </div>

  <!-- Log sections container -->
  <div id="logsContainer"></div>

</div>

<script>
// =============================================================================
// State
// =============================================================================
let accounts = [];
let runningSessions = new Set();   // session_ids активных с этого браузера
let sessionAborts = {};            // session_id -> AbortController
let accountCounter = 0;
let timerHandle = null;
let timerCountdownHandle = null;
let currentTab = 'vk';
let customWhitelist = null;  // null = use default; array of strings = custom CIDRs

// =============================================================================
// Whitelist selection
// =============================================================================
function setWhitelistMode(mode) {
  const btn = document.getElementById('btnPickWhitelist');
  const status = document.getElementById('customWhitelistStatus');
  if (mode === 'custom') {
    btn.style.display = '';
    if (!customWhitelist) status.textContent = 'файл не выбран';
  } else {
    btn.style.display = 'none';
    status.textContent = '';
  }
}

function loadCustomWhitelist(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('customWhitelistStatus');
  status.style.color = '#8b949e';
  status.textContent = 'Загрузка...';
  const reader = new FileReader();
  reader.onload = (e) => {
    const lines = e.target.result.split('\n');
    const cidrs = lines
      .map(l => l.trim())
      .filter(l => l && !l.startsWith('#'));
    customWhitelist = cidrs;
    status.style.color = '#3fb950';
    status.textContent = `${cidrs.length.toLocaleString('ru')} сетей загружено`;
  };
  reader.readAsText(file);
}

function getActiveWhitelist() {
  const mode = document.querySelector('input[name="whitelistMode"]:checked')?.value;
  return mode === 'custom' && customWhitelist ? customWhitelist : null;
}

async function fetchDefaultWhitelistInfo() {
  try {
    const r = await fetch('/api/whitelist-info');
    const d = await r.json();
    const el = document.getElementById('defaultWhitelistLabel');
    if (el) el.textContent = `(${d.file} — ${d.count.toLocaleString('ru')} сетей)`;
  } catch(e) {}
}

// =============================================================================
// Tab switching
// =============================================================================
function switchTab(type) {
  currentTab = type;
  document.getElementById('panelVK').style.display = type === 'vk' ? '' : 'none';
  document.getElementById('panelYC').style.display = type === 'yc' ? '' : 'none';
  document.getElementById('tabBtnVK').className = 'tab-btn' + (type === 'vk' ? ' active' : '');
  document.getElementById('tabBtnYC').className = 'tab-btn' + (type === 'yc' ? ' active' : '');
}

// =============================================================================
// Account management
// =============================================================================
function addVKAccount() {
  const id = 'acc_' + (++accountCounter);
  const acc = {
    id, type: 'vk',
    name: 'VK ' + accountCounter,
    openrcVars: {}, token: '', proxy: '',
    ips: [], selectedIPId: null, selectedIP: null, checked: true,
  };
  accounts.push(acc);
  renderAccount(acc);
}

function addYCAccount() {
  const id = 'acc_' + (++accountCounter);
  const acc = {
    id, type: 'yc',
    name: 'YC ' + accountCounter,
    keyId: '', saId: '', privateKey: '',
    folderId: '', zones: ['ru-central1-a'],
    proxy: '', ips: [], selectedIPId: null, selectedIP: null, checked: true,
  };
  accounts.push(acc);
  renderYCAccount(acc);
}

function removeAccount(id) {
  accounts = accounts.filter(a => a.id !== id);
  document.getElementById('card_' + id)?.remove();
  document.getElementById('log_section_' + id)?.remove();
}

function getAccount(id) {
  return accounts.find(a => a.id === id);
}

function renderAccount(acc) {
  const list = document.getElementById('vkAccountsList');
  const div = document.createElement('div');
  div.className = 'account-card';
  div.id = 'card_' + acc.id;
  div.innerHTML = `
    <div class="account-header">
      <input type="checkbox" id="chk_${acc.id}" checked onchange="toggleAccount('${acc.id}', this.checked)">
      <input class="account-name-input" type="text" value="${acc.name}"
             oninput="getAccount('${acc.id}').name = this.value; updateLogLabel('${acc.id}', this.value)">
      <button class="btn-icon" onclick="removeAccount('${acc.id}')" title="Удалить аккаунт">×</button>
    </div>

    <div class="field-row">
      <span class="field-label">OpenRC v3</span>
      <input type="file" accept=".sh,text/*" onchange="parseOpenRC('${acc.id}', this)">
      <span class="openrc-status" id="openrc_status_${acc.id}"></span>
    </div>

    <div class="field-row">
      <span class="field-label">API Токен</span>
      <input type="password" placeholder="Постоянный токен VK Cloud..."
             oninput="getAccount('${acc.id}').token = this.value">
    </div>

    <div class="field-row">
      <span class="field-label">Прокси</span>
      <input type="text" placeholder="socks5://user:pass@host:1080  или  http://host:3128"
             oninput="getAccount('${acc.id}').proxy = this.value">
      <button class="btn-secondary" style="font-size:0.72rem;padding:5px 10px;"
              onclick="checkProxy('${acc.id}')">Проверить</button>
      <span id="proxy_status_${acc.id}" style="font-family:monospace;font-size:0.75rem;"></span>
    </div>
    <div class="field-hint">Необязательно. Поддерживаются socks5:// и http://</div>

    <div style="display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;">
      <button class="btn-secondary" id="btnLoad_${acc.id}" onclick="loadIPs('${acc.id}')">Загрузить IP</button>
      <span id="load_status_${acc.id}" style="font-size:0.75rem;color:#8b949e;"></span>
    </div>

    <div id="ip_list_${acc.id}" class="ip-list-small">
      <div class="empty-hint">Нажмите "Загрузить IP"</div>
    </div>

    <div class="replace-label" id="replace_label_${acc.id}">
      Выбранный для замены: <span>не выбран</span>
    </div>
    <div style="margin-top:8px;">
      <button class="btn-danger" id="btnReplace_${acc.id}" onclick="startReplace('${acc.id}')" disabled>
        Заменить выбранный IP
      </button>
    </div>
  `;
  list.appendChild(div);

  // Restore saved field values (used when recreating account from localStorage)
  if (acc.token) {
    const tokenEl = div.querySelector('input[type="password"]');

function toggleZone(accId, zone, checked) {

  else { acc.zones = acc.zones.filter(z => z !== zone); }
}

function toggleAccount(id, checked) {
  const acc = getAccount(id);
  if (acc) acc.checked = checked;
}

// =============================================================================
// authorized_key.json parsing
// =============================================================================
function parseAuthorizedKey(accId, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const key = JSON.parse(e.target.result);
      const acc = getAccount(accId);
      if (!acc) return;
      acc.keyId = key.id || '';
      acc.saId = key.service_account_id || '';
      acc.privateKey = key.private_key || '';
      const el = document.getElementById('key_status_' + accId);
      if (el) {
        el.className = 'openrc-status openrc-ok';
        el.textContent = (acc.keyId || '').slice(0, 8) + '...';
      }
    } catch(err) {
      const el = document.getElementById('key_status_' + accId);
      if (el) { el.className = 'openrc-status openrc-err'; el.textContent = 'Ошибка парсинга JSON'; }
    }
  };
  reader.readAsText(file);
}

// =============================================================================
// OpenRC parsing
// =============================================================================
function parseOpenRC(accId, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const vars = {};
    const re = /export\s+([A-Z_]+)\s*=\s*["']?([^"'\s;#]+)["']?/g;
    let m;
    while ((m = re.exec(text)) !== null) vars[m[1]] = m[2];

    const acc = getAccount(accId);
    if (acc) acc.openrcVars = vars;

    const needed = ['OS_AUTH_URL', 'OS_PROJECT_ID', 'OS_REGION_NAME'];
    const missing = needed.filter(k => !vars[k]);
    const el = document.getElementById('openrc_status_' + accId);
    if (missing.length) {
      el.className = 'openrc-status openrc-err';
      el.textContent = 'Не найдены: ' + missing.join(', ');
    } else {
      el.className = 'openrc-status openrc-ok';
      el.textContent = vars['OS_PROJECT_ID'].slice(0, 8) + '...';
    }
  };
  reader.readAsText(file);
}

// =============================================================================
// Credentials helpers
// =============================================================================
function getCredParams(acc) {
  return {
    auth_url:   (acc.openrcVars || {})['OS_AUTH_URL']   || '',
    project_id: (acc.openrcVars || {})['OS_PROJECT_ID'] || '',
    region:     (acc.openrcVars || {})['OS_REGION_NAME'] || 'RegionOne',
    api_token:  acc.token || '',
    proxy_url:  acc.proxy || '',
  };
}

function validateAcc(acc) {
  if (acc.type === 'yc') {
    const problems = [];
    if (!acc.keyId || !acc.saId || !acc.privateKey) problems.push('Загрузите файл authorized_key.json');
    if (!acc.folderId) problems.push('Введите Folder ID');
    if (!acc.zones || !acc.zones.length) problems.push('Выберите хотя бы одну зону');
    return problems;
  }
  const c = getCredParams(acc);
  const problems = [];
  if (!c.auth_url)   problems.push('Загрузите OpenRC файл');
  if (!c.project_id) problems.push('OpenRC не содержит OS_PROJECT_ID');
  if (!c.api_token)  problems.push('Введите API Токен');
  return problems;
}

async function loadIPs(accId) {
  const acc = getAccount(accId);
  if (!acc) return;
  const problems = validateAcc(acc);
  if (problems.length) { alert(acc.name + ':\n' + problems.join('\n')); return; }

  const btn = document.getElementById('btnLoad_' + accId);
  const statusEl = document.getElementById('load_status_' + accId);
  btn.disabled = true;
  btn.textContent = 'Загрузка...';
  statusEl.textContent = '';

  const c = getCredParams(acc);
  const qs = new URLSearchParams(c).toString();
  try {
    const r = await fetch('/api/ips?' + qs);
    const d = await r.json();
    if (d.error) { statusEl.style.color = '#f85149'; statusEl.textContent = d.error; return; }
    acc.ips = d.ips;
    statusEl.style.color = '#3fb950';
    statusEl.textContent = d.ips.length + ' IP загружено';
    renderIPList(accId, d.ips);
  } catch (e) {
    statusEl.style.color = '#f85149';
    statusEl.textContent = 'Ошибка: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Загрузить IP';
  }
}

function buildAccountPayload(acc, mode) {
  const oldIpId = (mode === 'replace' && acc.selectedIPId) ? acc.selectedIPId : '';
  if (acc.type === 'yc') {
    return {
      type: 'yc',
      id: acc.id, name: acc.name,
      key_id: acc.keyId, sa_id: acc.saId, private_key: acc.privateKey,
      folder_id: acc.folderId, zones: acc.zones || ['ru-central1-a'],
      proxy_url: acc.proxy || null,
      old_ip_id: oldIpId,
    };
  }
  const c = getCredParams(acc);
  return {
    type: 'vk',
    id: acc.id, name: acc.name,
    auth_url: c.auth_url, project_id: c.project_id,
    region: c.region, api_token: c.api_token,
    proxy_url: c.proxy_url,
    old_ip_id: oldIpId,
  };
}

  const delayMax = parseFloat(document.getElementById('delayMax').value) || 8;
  const longPauseChance = parseFloat(document.getElementById('longPauseChance').value) || 0;
  const longPauseMin = parseFloat(document.getElementById('longPauseMin').value) || 5;
  const longPauseMax = parseFloat(document.getElementById('longPauseMax').value) || 20;
  const restEnabled = document.getElementById('restEnabled').checked;
  const restEvery = parseInt(document.getElementById('restEvery').value) || 50;
  const restMin = parseFloat(document.getElementById('restMin').value) || 30;
  const restMax = parseFloat(document.getElementById('restMax').value) || 90;

  const body = {
    mode: 'find',
    delay_min: delayMin,
    delay_max: delayMax,
    long_pause_chance: longPauseChance,
    long_pause_min: longPauseMin,
    long_pause_max: longPauseMax,
    rest_every: restEnabled ? restEvery : 0,
    rest_min: restMin,
    rest_max: restMax,
    custom_whitelist: getActiveWhitelist(),
    accounts: selected.map(acc => buildAccountPayload(acc, 'find')),

  launchStream(body, selected);
}

async function launchStream(body, involvedAccounts) {
  for (const acc of involvedAccounts) {
    getOrCreateLogSection(acc.id, acc.name);
    clearLog(acc.id);
    setBanner(acc.id, 'running', 'Запуск...');
  }

  // Step 1: Create persistent session
  let sessionId;
  try {
    const r = await fetch('/api/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || 'HTTP ' + r.status);
    sessionId = d.session_id;
  } catch(e) {
    for (const acc of involvedAccounts) {
      addLog(acc.id, 'warn', 'Ошибка запуска: ' + e.message);
      setBanner(acc.id, 'error', 'Ошибка запуска');
    }
    return;
  }

  runningSessions.add(sessionId);
  sessionAborts[sessionId] = new AbortController();

  localStorage.setItem('session_id', sessionId);
  localStorage.setItem('session_accounts', JSON.stringify(
    involvedAccounts.map(a => {
      const base = { id: a.id, name: a.name, type: a.type || 'vk', proxy: a.proxy,
                     selectedIPId: a.selectedIPId, selectedIP: a.selectedIP, checked: a.checked };
      if (a.type === 'yc') {
        return { ...base, keyId: a.keyId, saId: a.saId, privateKey: a.privateKey,
                 folderId: a.folderId, zones: a.zones };
      }
      return { ...base, openrcVars: a.openrcVars, token: a.token };
    })
  ));
  localStorage.setItem('session_settings', JSON.stringify({
    delayMin:        document.getElementById('delayMin').value,
    delayMax:        document.getElementById('delayMax').value,
    longPauseChance: document.getElementById('longPauseChance').value,
    longPauseMin:    document.getElementById('longPauseMin').value,
    longPauseMax:    document.getElementById('longPauseMax').value,
    restEnabled:     document.getElementById('restEnabled').checked,
    restEvery:       document.getElementById('restEvery').value,
    restMin:         document.getElementById('restMin').value,
    restMax:         document.getElementById('restMax').value,
    timerEnabled:    document.getElementById('timerEnabled').checked,
    timerMinutes:    document.getElementById('timerMinutes').value,
  }));

  // Start frontend timer only for the first session
  if (runningSessions.size === 1) startTimer();

  updateRunningUI();
  loadSessionsPanel();

  // Step 2: Connect SSE stream
  connectStream(sessionId, involvedAccounts);
}

function connectStream(sessionId, involvedAccounts) {
  const ctrl = sessionAborts[sessionId];
  fetch('/api/stream?session_id=' + encodeURIComponent(sessionId), {
    signal: ctrl ? ctrl.signal : undefined,
  })
  .then(res => {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let lastEvent = 'message';

    function pump() {
      return reader.read().then(({ done, value }) => {
        if (done) {
          // Stream closed normally — session completed
          if (localStorage.getItem('session_id') === sessionId) {
            localStorage.removeItem('session_id');
            localStorage.removeItem('session_accounts');
            localStorage.removeItem('session_settings');
            localStorage.removeItem('timer_ends_at');
          }
          checkAllDone(sessionId);
          return;
        }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('event:')) {
            lastEvent = line.slice(6).trim();
          } else if (line.startsWith('data:')) {
            handleSSEEvent(lastEvent, line.slice(5).trim());
          } else if (line === '') {
            lastEvent = 'message';
          }
        }
        return pump();
      }).catch(err => {
        if (err.name !== 'AbortError') {
          for (const acc of involvedAccounts) {
            addLog(acc.id, 'warn', 'Соединение прервано: ' + err.message);
          }
        }
        checkAllDone(sessionId);
      });
    }
    return pump();
  })
  .catch(err => {
    if (err.name !== 'AbortError') {
      for (const acc of involvedAccounts) {
        addLog(acc.id, 'warn', 'Ошибка запроса: ' + err.message);
        setBanner(acc.id, 'error', 'Ошибка соединения');
      }
    } else {
      for (const acc of involvedAccounts) {
        setBanner(acc.id, 'stopped', 'Остановлено. Сервер удаляет IP...');
      }
    }
    checkAllDone(sessionId);
  });
}

// =============================================================================
// Timer
// =============================================================================
function startTimer(endsAtOverride) {
  clearTimer();
  const enabled = document.getElementById('timerEnabled').checked;
  if (!enabled && !endsAtOverride) return;

  let endsAt = endsAtOverride;
  if (!endsAt) {
    const minutes = parseFloat(document.getElementById('timerMinutes').value) || 60;
    endsAt = Date.now() + minutes * 60 * 1000;
    localStorage.setItem('timer_ends_at', String(endsAt));
  }

  const remaining = endsAt - Date.now();
  if (remaining <= 0) return;

  timerHandle = setTimeout(() => {
    addLog('system', 'warn', 'Таймер истёк — останавливаем поиск...');
    stopAll();
  }, remaining);

  const el = document.getElementById('timerCountdown');
  timerCountdownHandle = setInterval(() => {
    const rem = endsAt - Date.now();
    if (rem <= 0) { clearInterval(timerCountdownHandle); el.textContent = ''; return; }
    const h = Math.floor(rem / 3600000);
    const m = Math.floor((rem % 3600000) / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    el.textContent = h > 0 ? `(${h}ч ${m}м ${s}с)` : `(${m}м ${s}с)`;
  }, 1000);
}

function clearTimer() {
  if (timerHandle) { clearTimeout(timerHandle); timerHandle = null; }
  if (timerCountdownHandle) { clearInterval(timerCountdownHandle); timerCountdownHandle = null; }
  const el = document.getElementById('timerCountdown');
  if (el) el.textContent = '';
  localStorage.removeItem('timer_ends_at');
}

function checkAllDone(sid) {
  runningSessions.delete(sid);
  delete sessionAborts[sid];
  if (runningSessions.size === 0) clearTimer();
  updateRunningUI();
  loadSessionsPanel();
}

async function stopAll() {
  clearTimer();
  for (const ctrl of Object.values(sessionAborts)) {
    ctrl.abort();
  }
  sessionAborts = {};
  runningSessions.clear();
  localStorage.removeItem('session_id');
  localStorage.removeItem('session_accounts');
  localStorage.removeItem('session_settings');
  localStorage.removeItem('timer_ends_at');
  try {
    await fetch('/api/stop-all', { method: 'POST' });
  } catch(e) {}
  updateRunningUI();
  loadSessionsPanel();
}

async function stopSession(sid) {
  const ctrl = sessionAborts[sid];
  if (ctrl) { ctrl.abort(); delete sessionAborts[sid]; }
  runningSessions.delete(sid);
  if (runningSessions.size === 0) clearTimer();
  if (localStorage.getItem('session_id') === sid) {
    localStorage.removeItem('session_id');
    localStorage.removeItem('session_accounts');
    localStorage.removeItem('session_settings');
    localStorage.removeItem('timer_ends_at');
  }
  try {
    await fetch('/api/stop', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sid }),
    });
  } catch(e) {}
  updateRunningUI();
  loadSessionsPanel();
}

// =============================================================================
// Sessions panel — visible to all devices
// =============================================================================
async function loadSessionsPanel() {
  try {
    const r = await fetch('/api/sessions');
    const d = await r.json();
    const active = (d.sessions || []).filter(s => !s.done);
    renderSessionsList(active);
  } catch(e) {
    // Server not reachable
  }
}

function renderSessionsList(sessions) {
  const panel = document.getElementById('sessionsPanel');
  const list = document.getElementById('sessionsList');
  if (!sessions.length) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  list.innerHTML = '';
  for (const s of sessions) {
    const accountNames = (s.accounts || []).map(a => a.name).join(', ') || s.session_id.slice(0, 8);
    const isConnected = runningSessions.has(s.session_id);
    const item = document.createElement('div');
    item.style.cssText = 'background:#1c2a3e;border:1px solid #1f6feb;border-radius:6px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;';
    const nameSpan = document.createElement('span');
    nameSpan.style.cssText = 'color:#58a6ff;flex:1;font-size:0.85rem;';
    nameSpan.textContent = '\u25BA ' + accountNames;
    if (isConnected) {
      const badge = document.createElement('span');
      badge.style.cssText = 'color:#3fb950;font-size:0.75rem;margin-left:6px;';
      badge.textContent = '(подключено)';
      nameSpan.appendChild(badge);
    }
    const eventsSpan = document.createElement('span');
    eventsSpan.style.cssText = 'color:#8b949e;font-size:0.75rem;';
    eventsSpan.textContent = s.events + ' событий';
    item.appendChild(nameSpan);
    item.appendChild(eventsSpan);
    if (!isConnected) {
      const connectBtn = document.createElement('button');
      connectBtn.className = 'btn-primary';
      connectBtn.style.cssText = 'font-size:0.78rem;padding:5px 12px;';
      connectBtn.textContent = 'Подключиться';
      connectBtn.addEventListener('click', () => doReconnect(s.session_id, s.accounts || []));
      item.appendChild(connectBtn);
    }
    const stopBtn = document.createElement('button');
    stopBtn.className = 'btn-stop';
    stopBtn.style.cssText = 'font-size:0.78rem;padding:5px 12px;';
    stopBtn.textContent = 'Стоп';
    stopBtn.addEventListener('click', () => stopSession(s.session_id));
    item.appendChild(stopBtn);
    list.appendChild(item);
  }
}

function doReconnect(sid, accountsInfo) {
  const isMySession = localStorage.getItem('session_id') === sid;

  let savedAccounts = [];
  if (isMySession) {
    try { savedAccounts = JSON.parse(localStorage.getItem('session_accounts') || '[]'); } catch(e) {}
  }

  // Use full saved config (own device) or minimal info from server (other device)
  const accountsToRestore = savedAccounts.length ? savedAccounts : (accountsInfo || []).map(a => ({
    id: a.id, name: a.name, type: a.type || 'vk',
    openrcVars: {}, token: '', proxy: '',
    ips: [], selectedIPId: null, selectedIP: null, checked: true,
  }));

  for (const accData of accountsToRestore) {
    const existing = getAccount(accData.id);
    if (existing) {
      accounts = accounts.filter(a => a.id !== accData.id);
      document.getElementById('card_' + accData.id)?.remove();
    }
    const num = parseInt(accData.id.replace('acc_', '')) || 0;
    if (num > accountCounter) accountCounter = num;

    const accType = accData.type || 'vk';
    const acc = {
      id: accData.id, name: accData.name, type: accType,
      proxy: accData.proxy || '',
      ips: [], selectedIPId: accData.selectedIPId || null,
      selectedIP: accData.selectedIP || null, checked: accData.checked !== false,
      // VK fields
      openrcVars: accData.openrcVars || {}, token: accData.token || '',
      // YC fields
      keyId: accData.keyId || '', saId: accData.saId || '',
      privateKey: accData.privateKey || '',
      folderId: accData.folderId || '',
      zones: accData.zones || ['ru-central1-a'],
    };
    accounts.push(acc);
    if (accType === 'yc') renderYCAccount(acc);
    else renderAccount(acc);
  }

  if (isMySession) {
    try {
      const s = JSON.parse(localStorage.getItem('session_settings') || '{}');
      if (s.delayMin !== undefined)        document.getElementById('delayMin').value = s.delayMin;
      if (s.delayMax !== undefined)        document.getElementById('delayMax').value = s.delayMax;
      if (s.longPauseChance !== undefined) document.getElementById('longPauseChance').value = s.longPauseChance;
      if (s.longPauseMin !== undefined)    document.getElementById('longPauseMin').value = s.longPauseMin;
      if (s.longPauseMax !== undefined)    document.getElementById('longPauseMax').value = s.longPauseMax;
      if (s.restEnabled !== undefined)     document.getElementById('restEnabled').checked = s.restEnabled;
      if (s.restEvery !== undefined)       document.getElementById('restEvery').value = s.restEvery;
      if (s.restMin !== undefined)         document.getElementById('restMin').value = s.restMin;
      if (s.restMax !== undefined)         document.getElementById('restMax').value = s.restMax;
      if (s.timerEnabled !== undefined)    document.getElementById('timerEnabled').checked = s.timerEnabled;
      if (s.timerMinutes !== undefined)    document.getElementById('timerMinutes').value = s.timerMinutes;
    } catch(e) {}

    const timerEndsAt = parseInt(localStorage.getItem('timer_ends_at') || '0');
    if (timerEndsAt > Date.now()) startTimer(timerEndsAt);
  }

  runningSessions.add(sid);
  sessionAborts[sid] = new AbortController();
  updateRunningUI();

  for (const acc of accountsToRestore) {
    getOrCreateLogSection(acc.id, acc.name);
    clearLog(acc.id);
    setBanner(acc.id, 'running', 'Переподключение...');
  }

  connectStream(sid, accountsToRestore);
  loadSessionsPanel();
}

// =============================================================================
// SSE event handler
// =============================================================================
function handleSSEEvent(event, rawData) {
  let d;
  try { d = JSON.parse(rawData); } catch { return; }

  const accId = d.account_id || 'system';

  if (event === 'status') {
    addLog(accId, 'info', d.msg || rawData);

  } else if (event === 'attempt') {
    const zoneTag = d.zone ? ` [${d.zone.replace('ru-central1-','')}]` : '';
    if (d.match) {
      addLog(accId, 'hit', `[#${d.n}] ${d.ip}${zoneTag}  — НАЙДЕН!  сеть: ${d.match}`);
    } else {
      addLog(accId, 'miss', `[#${d.n}] ${d.ip}${zoneTag}  — не в белом списке`);
    }

  } else if (event === 'success') {
    const zoneTag = d.zone ? `  зона: ${d.zone}` : '';
    addLog(accId, 'hit', `Найден: ${d.ip}  (${d.network})${zoneTag}  за ${d.attempts} попытки`);
    setBanner(accId, 'success',
      `IP из белого списка: ${d.ip}  (${d.network})${zoneTag}  попыток: ${d.attempts}`);

  } else if (event === 'error') {
    addLog(accId, 'warn', 'ОШИБКА: ' + (d.msg || rawData));
    setBanner(accId, 'error', d.msg || rawData);
  }
}

// =============================================================================
// Log helpers
// =============================================================================
function getOrCreateLogSection(accId, accName) {
  if (document.getElementById('log_section_' + accId)) return;
  const container = document.getElementById('logsContainer');
  const section = document.createElement('div');
  section.className = 'log-section';
  section.id = 'log_section_' + accId;
  section.innerHTML = `
    <div class="log-account-label" id="log_label_${accId}">${accName}</div>
    <div class="log-panel" id="log_panel_${accId}"></div>
    <div class="status-banner" id="banner_${accId}"></div>
  `;
  container.appendChild(section);
}

function updateLogLabel(accId, name) {
  const el = document.getElementById('log_label_' + accId);
  if (el) el.childNodes[0].textContent = name;
}

function clearLog(accId) {
  const panel = document.getElementById('log_panel_' + accId);
  if (panel) panel.innerHTML = '';
  setBanner(accId, '', '');
}

function addLog(accId, cls, text) {
  getOrCreateLogSection(accId, accId);
  const panel = document.getElementById('log_panel_' + accId);
  if (!panel) return;
  const row = document.createElement('div');
  row.className = 'log-row log-' + cls;
  row.textContent = text;
  panel.appendChild(row);
  panel.scrollTop = panel.scrollHeight;
}

function setBanner(accId, type, text) {
  const el = document.getElementById('banner_' + accId);
  if (!el) return;
  if (!type) { el.className = 'status-banner'; el.textContent = ''; return; }
  el.className = 'status-banner show status-' + type;
  el.textContent = text;
}

// =============================================================================
// Running UI state
// =============================================================================
function updateRunningUI() {
  const running = runningSessions.size > 0;
  document.getElementById('btnStartAll').textContent =
    running ? 'Запустить ещё' : 'Запустить поиск на выбранных';
  document.getElementById('btnStopAll').style.display =
    running ? 'inline-block' : 'none';
  accounts.forEach(acc => {
    const btn = document.getElementById('btnReplace_' + acc.id);
    if (btn) btn.disabled = running || !acc.selectedIPId;
  });
}

// =============================================================================
// Proxy check
// =============================================================================
async function checkProxy(accId) {
  const acc = getAccount(accId);
  if (!acc) return;
  const proxyUrl = acc.proxy.trim();
  const out = document.getElementById('proxy_status_' + accId);
  if (!proxyUrl) { out.style.color = '#d29922'; out.textContent = 'Прокси не задан'; return; }

  out.style.color = '#8b949e';
  out.textContent = 'Проверка...';

  try {
    const r = await fetch('/api/check-proxy?proxy_url=' + encodeURIComponent(proxyUrl));
    const d = await r.json();
    if (d.ok) {
      out.style.color = '#3fb950';
      out.textContent = 'OK — IP: ' + d.ip;
    } else {
      out.style.color = '#f85149';
      out.textContent = 'Ошибка: ' + (d.error || 'неизвестно');
    }
  } catch(e) {
    out.style.color = '#f85149';
    out.textContent = 'Ошибка: ' + e.message;
  }
}

// =============================================================================
// IP check widget
// =============================================================================
async function checkIP() {
  const ip = document.getElementById('checkIpInput').value.trim();
  const out = document.getElementById('checkIpResult');
  if (!ip) return;
  out.style.color = '#8b949e';
  out.textContent = '...';
  try {
    const r = await fetch('/api/check-ip?ip=' + encodeURIComponent(ip));
    const d = await r.json();
    if (d.error) { out.style.color = '#f85149'; out.textContent = d.error; return; }
    if (d.in_whitelist) {
      out.style.color = '#3fb950';
      out.textContent = 'СОВПАДЕНИЕ -> ' + d.network;
    } else {
      out.style.color = '#f85149';
      out.textContent = 'не в белом списке';
    }
  } catch(e) {
    out.style.color = '#f85149';
    out.textContent = 'ошибка: ' + e.message;
  }
}

// =============================================================================
// Init
// =============================================================================
addVKAccount();
loadSessionsPanel();
fetchDefaultWhitelistInfo();
setInterval(loadSessionsPanel, 10_000);
</script>
